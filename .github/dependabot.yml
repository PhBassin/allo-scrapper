version: 2

multi-ecosystem-groups:
  all-dependencies:
    schedule:
      interval: weekly
    open-pull-requests-limit: 1

updates:
  - package-ecosystem: npm
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: all-dependencies

  - package-ecosystem: npm
    directory: "/server"
    patterns:
      - "*"
    multi-ecosystem-group: all-dependencies

  - package-ecosystem: npm
    directory: "/client"
    patterns:
      - "*"
    multi-ecosystem-group: all-dependencies

  - package-ecosystem: npm
    directory: "/scraper"
    patterns:
      - "*"
    multi-ecosystem-group: all-dependencies

  - package-ecosystem: github-actions
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: all-dependencies
