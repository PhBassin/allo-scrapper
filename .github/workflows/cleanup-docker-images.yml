name: Cleanup Docker Images

# Manual cleanup workflow (trigger via workflow_dispatch)
# Keeps N most recent versions, protects important tags
# Default: keeps 30 versions and runs in dry-run mode for safety
on:
  workflow_dispatch:
    inputs:
      keep_versions:
        description: 'Number of recent versions to keep'
        required: true
        default: '30'
        type: string
      dry-run:
        description: 'Enable dry-run mode (test without deleting)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  KEEP_VERSIONS: ${{ github.event.inputs.keep_versions || '30' }}

jobs:
  cleanup-images:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    
    steps:
      - name: Determine dry-run mode
        id: dry-run
        run: |
          echo "enabled=${{ inputs.dry-run }}" >> $GITHUB_OUTPUT

      - name: Delete old container images (DRY-RUN)
        if: steps.dry-run.outputs.enabled == 'true'
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'allo-scrapper'
          package-type: 'container'
          min-versions-to-keep: ${{ env.KEEP_VERSIONS }}
          delete-only-untagged-versions: 'true'
          token: ${{ secrets.GITHUB_TOKEN }}
          dry-run: true

      - name: Delete old container images (PRODUCTION)
        if: steps.dry-run.outputs.enabled == 'false'
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'allo-scrapper'
          package-type: 'container'
          min-versions-to-keep: ${{ env.KEEP_VERSIONS }}
          delete-only-untagged-versions: 'true'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup summary
        run: |
          echo "### 🧹 Docker Image Cleanup Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.dry-run.outputs.enabled }}" == "true" ]; then
            echo "**Mode:** 🔍 DRY-RUN (no images were actually deleted)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "ℹ️ To disable dry-run mode:" >> $GITHUB_STEP_SUMMARY
            echo "1. Go to Actions tab" >> $GITHUB_STEP_SUMMARY
            echo "2. Run this workflow manually" >> $GITHUB_STEP_SUMMARY
            echo "3. Set dry-run to 'false'" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Mode:** ✅ PRODUCTION (images deleted)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Policy:**" >> $GITHUB_STEP_SUMMARY
          echo "- Keep: ${{ env.KEEP_VERSIONS }} versions maximum" >> $GITHUB_STEP_SUMMARY
          echo "- Delete: Only untagged versions" >> $GITHUB_STEP_SUMMARY
          echo "- Protected: All tagged versions (latest, stable, develop, main, v*, pr-*)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "💡 **Alternative:** Use the \`scripts/cleanup-old-docker-images.sh\` script for more control and tag filtering." >> $GITHUB_STEP_SUMMARY
