name: CI

on:
  push:
    branches:
      - develop
      - 'feat/**'
      - 'fix/**'
      - 'docs/**'
      - 'chore/**'
      - 'ci/**'
      - 'refactor/**'
      - 'test/**'
      - 'perf/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    name: TypeScript build & tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript type-check (Workspaces)
        run: npm run build --workspaces --if-present

      - name: Run tests
        run: npm run test:run
        working-directory: server

      - name: Run Redis integration tests
        run: npm run test:integration
        working-directory: server

      - name: Redis integration diagnostics (on failure)
        if: failure()
        run: |
          echo "Redis integration tests failed."
          echo "Container diagnostics are emitted by integration tests on failure."
          echo "If needed, rerun locally: npm run test:integration --workspace=allo-scrapper-server"

      - name: Check test coverage
        run: npm run test:coverage
        working-directory: server
