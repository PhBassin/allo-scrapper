name: Version Tag & Release

# Triggered after docker-build-push.yml completes successfully on main branch
on:
  workflow_run:
    workflows: ["Docker Build & Push"]
    types:
      - completed

permissions:
  contents: write
  packages: write
  pull-requests: read
  actions: read

jobs:
  create-version-tag:
    name: Create Version Tag
    runs-on: ubuntu-latest
    # Only run if Docker build succeeded AND triggered from main branch
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main  # Explicitly checkout main branch
          fetch-depth: 0  # Need full history for git describe
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Get last version tag
        id: last_tag
        run: |
          # Get the last semver tag, or default to v0.0.0 if no tags exist
          # --match 'v[0-9]*' filters out non-semver tags (e.g. 'stable', 'backup-*')
          LAST_TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || echo "v0.0.0")
          echo "tag=${LAST_TAG}" >> $GITHUB_OUTPUT
          echo "Last tag: ${LAST_TAG}"

      - name: Get merged PR number
        id: pr
        run: |
          # Get the PR that was merged in the commit that triggered the workflow
          PR_NUMBER=$(gh pr list --state merged --json number,mergeCommit --jq ".[] | select(.mergeCommit.oid==\"${{ github.event.workflow_run.head_sha }}\") | .number" | head -1)
          if [ -z "$PR_NUMBER" ]; then
            echo "No merged PR found for commit ${{ github.event.workflow_run.head_sha }}"
            echo "number=" >> $GITHUB_OUTPUT
          else
            echo "number=${PR_NUMBER}" >> $GITHUB_OUTPUT
            echo "Found PR #${PR_NUMBER}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version bump type
        id: bump
        run: |
          BUMP_TYPE="patch"  # Default to patch
          
          if [ -n "${{ steps.pr.outputs.number }}" ]; then
            # Fetch PR labels
            PR_LABELS=$(gh pr view ${{ steps.pr.outputs.number }} --json labels --jq '.labels[].name')
            echo "PR Labels: ${PR_LABELS}"
            
            # Check for explicit version labels (highest priority)
            if echo "$PR_LABELS" | grep -q "^major$"; then
              BUMP_TYPE="major"
            elif echo "$PR_LABELS" | grep -q "^minor$"; then
              BUMP_TYPE="minor"
            elif echo "$PR_LABELS" | grep -q "^patch$"; then
              BUMP_TYPE="patch"
            else
              # Fallback: check PR title for patterns
              PR_TITLE=$(gh pr view ${{ steps.pr.outputs.number }} --json title --jq '.title')
              echo "PR Title: ${PR_TITLE}"
              
              if echo "$PR_TITLE" | grep -qiE "(BREAKING CHANGE:|\\[major\\])"; then
                BUMP_TYPE="major"
              elif echo "$PR_TITLE" | grep -qE "^feat(\(|:)"; then
                BUMP_TYPE="minor"
              elif echo "$PR_TITLE" | grep -qE "^fix(\(|:)"; then
                BUMP_TYPE="patch"
              fi
            fi
          else
            echo "No PR found, defaulting to patch bump"
          fi
          
          echo "type=${BUMP_TYPE}" >> $GITHUB_OUTPUT
          echo "Version bump type: ${BUMP_TYPE}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate new version
        id: new_version
        run: |
          LAST_TAG="${{ steps.last_tag.outputs.tag }}"
          BUMP_TYPE="${{ steps.bump.outputs.type }}"
          
          # Strip 'v' prefix for calculation
          VERSION=${LAST_TAG#v}
          
          # Parse semantic version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          
          # Validate parsed version components are numeric
          if ! [[ "$MAJOR" =~ ^[0-9]+$ && "$MINOR" =~ ^[0-9]+$ && "$PATCH" =~ ^[0-9]+$ ]]; then
            echo "::error::Failed to parse semver from tag '${LAST_TAG}': MAJOR=${MAJOR}, MINOR=${MINOR}, PATCH=${PATCH}"
            exit 1
          fi
          
          # Bump the appropriate component
          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_TAG="v${NEW_VERSION}"
          
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${NEW_TAG}" >> $GITHUB_OUTPUT
          echo "New version: ${NEW_TAG}"

      - name: Generate changelog entry
        id: changelog
        run: |
          chmod +x .github/scripts/generate-changelog.sh
          
          LAST_TAG="${{ steps.last_tag.outputs.tag }}"
          NEW_TAG="${{ steps.new_version.outputs.tag }}"
          
          # Generate changelog content
          CHANGELOG_CONTENT=$(.github/scripts/generate-changelog.sh "$LAST_TAG" "HEAD")
          
          # Save to file for next step
          echo "$CHANGELOG_CONTENT" > /tmp/changelog-entry.md
          
          echo "Generated changelog entry"
          cat /tmp/changelog-entry.md

      - name: Update package.json version
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          
          # Update root package.json
          jq --arg version "$NEW_VERSION" '.version = $version' package.json > package.json.tmp
          mv package.json.tmp package.json
          
          echo "Updated package.json to version ${NEW_VERSION}"

      - name: Update CHANGELOG.md
        run: |
          NEW_TAG="${{ steps.new_version.outputs.tag }}"
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          LAST_TAG="${{ steps.last_tag.outputs.tag }}"
          TODAY=$(date +%Y-%m-%d)
          
          # Create new changelog entry with header
          {
            echo "## [${NEW_VERSION}] - ${TODAY}"
            echo ""
            cat /tmp/changelog-entry.md
            echo ""
          } > /tmp/new-changelog.md
          
          # Insert after the header (after line 6 which is the blank line after semver line)
          head -n 7 CHANGELOG.md > /tmp/changelog-top.md
          tail -n +8 CHANGELOG.md > /tmp/changelog-bottom.md
          
          # Combine: top + new entry + bottom
          cat /tmp/changelog-top.md /tmp/new-changelog.md /tmp/changelog-bottom.md > CHANGELOG.md
          
          # Add version link at the bottom (find the line with [4.0.1] and add new one before it)
          # Extract repo URL from existing links
          REPO_URL=$(grep -m 1 "^\[.*\]: https://github.com" CHANGELOG.md | sed -E 's/\[.*\]: (https:\/\/github\.com\/[^\/]+\/[^\/]+).*/\1/')
          
          if [ -n "$REPO_URL" ]; then
            # Add new version link after the last ## heading (before first version link)
            LINE_NUM=$(grep -n "^\[.*\]: https://github.com" CHANGELOG.md | head -1 | cut -d: -f1)
            if [ -n "$LINE_NUM" ]; then
              # Insert before the first version link
              head -n $((LINE_NUM - 1)) CHANGELOG.md > /tmp/changelog-with-link.md
              echo "[${NEW_VERSION}]: ${REPO_URL}/compare/${LAST_TAG}...${NEW_TAG}" >> /tmp/changelog-with-link.md
              tail -n +${LINE_NUM} CHANGELOG.md >> /tmp/changelog-with-link.md
              mv /tmp/changelog-with-link.md CHANGELOG.md
            fi
            
            # Sort version links chronologically (newest first)
            grep "^\[.*\]: https://github.com" CHANGELOG.md > /tmp/version-links.txt
            sort -t'[' -k2 -Vr /tmp/version-links.txt > /tmp/sorted-links.txt
            
            # Remove old links from changelog
            sed -i '/^\[.*\]: https:\/\/github\.com/d' CHANGELOG.md
            
            # Append sorted links at the end
            cat /tmp/sorted-links.txt >> CHANGELOG.md
          fi
          
          echo "Updated CHANGELOG.md"

      - name: Commit version bump
        run: |
          NEW_TAG="${{ steps.new_version.outputs.tag }}"
          
          git add package.json CHANGELOG.md
          git commit -m "chore(release): bump version to ${NEW_TAG} [skip ci]"
          
          echo "Committed version bump"

      - name: Create git tag
        run: |
          NEW_TAG="${{ steps.new_version.outputs.tag }}"
          
          # Create annotated tag
          git tag -a "${NEW_TAG}" -m "Release ${NEW_TAG}"
          
          echo "Created tag ${NEW_TAG}"

      - name: Push changes and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_TAG="${{ steps.new_version.outputs.tag }}"
          
          # Push commit and tag using git with auth
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin HEAD:main
          git push origin "${NEW_TAG}"
          
          echo "Pushed commit and tag ${NEW_TAG}"

      - name: Move stable tag to new release
        run: |
          NEW_TAG="${{ steps.new_version.outputs.tag }}"
          
          # Move the stable tag to point to this release commit
          git tag -fa stable -m "Latest stable release: ${NEW_TAG}"
          git push origin stable --force
          
          echo "Moved stable tag to ${NEW_TAG}"

      - name: Generate release notes from template
        id: release_notes
        run: |
          NEW_TAG="${{ steps.new_version.outputs.tag }}"
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          LAST_TAG="${{ steps.last_tag.outputs.tag }}"
          
          # Parse version components
          IFS='.' read -r MAJOR MINOR PATCH <<< "$NEW_VERSION"
          
          # Generate upgrade notes
          UPGRADE_NOTES="- No breaking changes"
          
          # Check for breaking changes in changelog
          if grep -q "### ⚠️ Breaking Changes" /tmp/changelog-entry.md; then
            UPGRADE_NOTES="⚠️ **This release contains breaking changes. See changelog above for migration guidance.**"
          fi
          
          # Check for new migrations
          NEW_MIGRATIONS=$(git diff --name-only ${LAST_TAG}..HEAD | grep "^migrations/" | wc -l || echo "0")
          if [ "$NEW_MIGRATIONS" -gt 0 ]; then
            UPGRADE_NOTES="${UPGRADE_NOTES}\\n- Database migrations: ${NEW_MIGRATIONS} new migration(s) (run automatically on startup)"
          fi
          
          # Read changelog content
          CHANGELOG_CONTENT=$(cat /tmp/changelog-entry.md)
          
          # Create release notes with template
          cat > /tmp/release-notes.md << 'RELEASE_EOF'
          ## 🎉 Release ${NEW_VERSION}
          
          ${CHANGELOG_CONTENT}
          
          ---
          
          ### 📦 Docker Images
          
          Pull the latest images with version tags:
          
          ```bash
          # Web application
          docker pull ghcr.io/phbassin/allo-scrapper:${NEW_VERSION}
          
          # Scraper microservice
          docker pull ghcr.io/phbassin/allo-scrapper-scraper:${NEW_VERSION}
          ```
          
          **Available tags:** `${NEW_VERSION}`, `${MAJOR}.${MINOR}`, `${MAJOR}`, `stable`, `latest`
          
          ---
          
          ### 🔄 Upgrade Notes
          
          ${UPGRADE_NOTES}
          
          ---
          
          ### 📚 Documentation
          
          - [Installation Guide](https://github.com/PhBassin/allo-scrapper#installation)
          - [Configuration Reference](https://github.com/PhBassin/allo-scrapper/blob/main/README.md#configuration)
          - [API Documentation](https://github.com/PhBassin/allo-scrapper/blob/main/README.md#api-endpoints)
          - [Troubleshooting](https://github.com/PhBassin/allo-scrapper/blob/main/AGENTS.md)
          
          ---
          
          **Full Changelog**: https://github.com/PhBassin/allo-scrapper/compare/${LAST_TAG}...${NEW_TAG}
          RELEASE_EOF
          
          # Now do variable substitution
          sed -i "s/\${NEW_VERSION}/${NEW_VERSION}/g" /tmp/release-notes.md
          sed -i "s/\${MAJOR}/${MAJOR}/g" /tmp/release-notes.md
          sed -i "s/\${MINOR}/${MINOR}/g" /tmp/release-notes.md
          sed -i "s/\${LAST_TAG}/${LAST_TAG}/g" /tmp/release-notes.md
          sed -i "s/\${NEW_TAG}/${NEW_TAG}/g" /tmp/release-notes.md
          
          # Replace upgrade notes (handle newlines)
          UPGRADE_NOTES_ESCAPED=$(echo -e "$UPGRADE_NOTES" | sed ':a;N;$!ba;s/\n/\\n/g')
          sed -i "s|\${UPGRADE_NOTES}|${UPGRADE_NOTES_ESCAPED}|g" /tmp/release-notes.md
          
          # Replace changelog content (preserve formatting)
          CHANGELOG_START=$(grep -n '${CHANGELOG_CONTENT}' /tmp/release-notes.md | cut -d: -f1)
          if [ -n "$CHANGELOG_START" ]; then
            head -n $((CHANGELOG_START - 1)) /tmp/release-notes.md > /tmp/release-top.md
            tail -n +$((CHANGELOG_START + 1)) /tmp/release-notes.md > /tmp/release-bottom.md
            cat /tmp/release-top.md /tmp/changelog-entry.md /tmp/release-bottom.md > /tmp/release-notes.md
          fi
          
          echo "Generated release notes from template"

      - name: Create GitHub release
        run: |
          NEW_TAG="${{ steps.new_version.outputs.tag }}"
          
          # Use processed release notes from template
          gh release create "${NEW_TAG}" \
            --title "Release ${NEW_TAG}" \
            --notes-file /tmp/release-notes.md \
            --verify-tag
          
          echo "Created GitHub release ${NEW_TAG}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag Docker images with version
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          NEW_TAG="${{ steps.new_version.outputs.tag }}"
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          # Parse version components for semver tags
          IFS='.' read -r MAJOR MINOR PATCH <<< "$NEW_VERSION"
          
          # Retag both web and scraper images
          for IMAGE in "ghcr.io/${REPO}" "ghcr.io/${REPO}-scraper"; do
            echo "Retagging ${IMAGE}..."
            
            # Add semver tags to the existing 'main' manifest
            docker buildx imagetools create \
              --tag "${IMAGE}:${NEW_VERSION}" \
              --tag "${IMAGE}:${MAJOR}.${MINOR}" \
              --tag "${IMAGE}:${MAJOR}" \
              --tag "${IMAGE}:${NEW_TAG}" \
              "${IMAGE}:main"
            
            echo "Tagged ${IMAGE} with: ${NEW_TAG}, ${NEW_VERSION}, ${MAJOR}.${MINOR}, ${MAJOR}"
          done

      - name: Summary
        run: |
          NEW_TAG="${{ steps.new_version.outputs.tag }}"
          LAST_TAG="${{ steps.last_tag.outputs.tag }}"
          BUMP_TYPE="${{ steps.bump.outputs.type }}"
          
          echo "### 🎉 Version Tag Created!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Previous version:** \`${LAST_TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "**New version:** \`${NEW_TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Bump type:** \`${BUMP_TYPE}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Updated \`package.json\`" >> $GITHUB_STEP_SUMMARY
          echo "✅ Updated \`CHANGELOG.md\`" >> $GITHUB_STEP_SUMMARY
          echo "✅ Created git tag \`${NEW_TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "✅ Created GitHub release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🐋 Docker images retagged with version tags" >> $GITHUB_STEP_SUMMARY
