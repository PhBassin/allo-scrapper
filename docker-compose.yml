services:
  ics-db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-ics}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ics-network

  # Redis – message queue between backend and scraper microservice
  ics-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ics-network

  # Production web server (serves both API and frontend)
  ics-web:
    image: ghcr.io/phbassin/allo-scrapper:${IMAGE_TAG:-stable}
    build:
      context: .
      args:
        VITE_APP_NAME: ${VITE_APP_NAME:-Allo-Scrapper}
    # Run as host user to allow volume writes while maintaining security
    # Set DOCKER_UID and DOCKER_GID in .env to match your host user
    # Defaults to 1000:1000 (standard Linux first user)
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    #pull_policy: always
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      # Mount theater config so API changes to theaters.json are visible on host
      # This enables: git add server/src/config/theaters.json && git commit && git push
      # IMPORTANT: Mount only theaters.json, not the entire config/ directory
      # (config/ now contains compiled TypeScript files like rate-limits.js)
      - ./server/src/config/theaters.json:/app/server/dist/config/theaters.json
    environment:
      NODE_ENV: production
      POSTGRES_HOST: ics-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ics}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PORT: 3000
      TZ: ${TZ:-Europe/Paris}
      SCRAPE_DELAY_MS: ${SCRAPE_DELAY_MS:-1000}
      SCRAPE_MODE: ${SCRAPE_MODE:-weekly}
      SCRAPE_DAYS: ${SCRAPE_DAYS:-7}
      REDIS_URL: redis://ics-redis:6379
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://ics-tempo:4317}
      # Authentication configuration (required for v2.0.0+)
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      AUTO_MIGRATE: ${AUTO_MIGRATE:-true}
    depends_on:
      ics-db:
        condition: service_healthy
      ics-redis:
        condition: service_healthy
    networks:
      - ics-network
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Scraper microservice – long-running consumer (processes jobs from Redis queue)
  ics-scraper:
    image: ghcr.io/phbassin/allo-scrapper-scraper:${IMAGE_TAG:-stable}
    # build:
    #   context: .
    #   dockerfile: Dockerfile.scraper
    restart: unless-stopped
    environment:
      NODE_ENV: production
      POSTGRES_HOST: ics-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ics}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REDIS_URL: redis://ics-redis:6379
      RUN_MODE: consumer
      SCRAPE_MODE: ${SCRAPE_MODE:-from_today_limited}
      SCRAPE_DAYS: ${SCRAPE_DAYS:-7}
      TZ: ${TZ:-Europe/Paris}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://ics-tempo:4317}
    depends_on:
      ics-db:
        condition: service_healthy
      ics-redis:
        condition: service_healthy
    networks:
      - ics-network

  # Scraper cron – scheduled automatic scraping (no Redis job queue needed)
  ics-scraper-cron:
    image: ghcr.io/phbassin/allo-scrapper-scraper:${IMAGE_TAG:-stable}
    # build:
    #   context: .
    #   dockerfile: Dockerfile.scraper
    restart: unless-stopped
    environment:
      NODE_ENV: production
      POSTGRES_HOST: ics-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ics}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REDIS_URL: redis://ics-redis:6379
      RUN_MODE: cron
      CRON_SCHEDULE: ${SCRAPE_CRON_SCHEDULE:-0 8 * * 3}
      SCRAPE_MODE: ${SCRAPE_MODE:-weekly}
      SCRAPE_DAYS: ${SCRAPE_DAYS:-7}
      TZ: ${TZ:-Europe/Paris}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://ics-tempo:4317}
    depends_on:
      ics-db:
        condition: service_healthy
      ics-redis:
        condition: service_healthy
    networks:
      - ics-network

# ---------------------------------------------------------------------------
# Monitoring stack (Loki, Promtail, Prometheus, Grafana, Tempo, exporters)
# has been moved to docker-compose.monitoring.yml so deployment platforms
# that ignore Compose profiles (e.g. Coolify) don't deploy it by default.
#
# Run together with:
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
# ---------------------------------------------------------------------------

networks:
  ics-network:
    name: ics-network
    driver: bridge

volumes:
  postgres-data:
