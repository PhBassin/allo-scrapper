services:
  ics-db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ics
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ics-network

  ics-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ics-network

  ics-web:
    image: ghcr.io/phbassin/allo-scrapper:${IMAGE_TAG:-stable}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      POSTGRES_HOST: ics-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PORT: 3000
      REDIS_URL: redis://ics-redis:6379
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      AUTO_MIGRATE: "true"
      LOG_LEVEL: info
      TZ: Europe/Paris
      JWT_EXPIRES_IN: 1h
    depends_on:
      ics-db:
        condition: service_healthy
      ics-redis:
        condition: service_healthy
    networks:
      - ics-network
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ics-scraper:
    image: ghcr.io/phbassin/allo-scrapper-scraper:${IMAGE_TAG:-stable}
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      POSTGRES_HOST: ics-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REDIS_URL: redis://ics-redis:6379
      RUN_MODE: consumer
      SCRAPE_MODE: from_today_limited
      SCRAPE_DAYS: "7"
      LOG_LEVEL: info
      TZ: Europe/Paris
    depends_on:
      ics-db:
        condition: service_healthy
      ics-redis:
        condition: service_healthy
    networks:
      - ics-network

  ics-scraper-cron:
    image: ghcr.io/phbassin/allo-scrapper-scraper:${IMAGE_TAG:-stable}
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      POSTGRES_HOST: ics-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REDIS_URL: redis://ics-redis:6379
      RUN_MODE: cron
      CRON_SCHEDULE: ${SCRAPE_CRON_SCHEDULE:-0 8 * * 3}
      SCRAPE_MODE: weekly
      SCRAPE_DAYS: "7"
      LOG_LEVEL: info
      TZ: Europe/Paris
    depends_on:
      ics-db:
        condition: service_healthy
      ics-redis:
        condition: service_healthy
    networks:
      - ics-network

networks:
  ics-network:
    name: ics-network
    driver: bridge

volumes:
  postgres-data:
