# Traefik v3 – static configuration
# Used by the ics-traefik service in the monitoring Docker Compose profile.
#
# Routing rules are defined as labels on each service in docker-compose.yml.

# ---------------------------------------------------------------------------
# API / Dashboard
# Accessible at http://localhost:8080/dashboard/ (local dev only – no auth)
# ---------------------------------------------------------------------------
api:
  dashboard: true
  insecure: true  # OK for local dev; lock this down in production

# ---------------------------------------------------------------------------
# Entrypoints
# ---------------------------------------------------------------------------
entryPoints:
  web:
    address: ":80"

# ---------------------------------------------------------------------------
# Providers
# ---------------------------------------------------------------------------
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    # Only expose services that explicitly set traefik.enable=true
    exposedByDefault: false
    # Note: do NOT set 'network' here. Docker Compose prefixes network names
    # with the project name (e.g. ics-network → allo-scrapper_ics-network),
    # so a hardcoded name would silently break routing. Traefik auto-selects
    # the first available network for each container, which is correct when
    # all services share a single network.

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log:
  level: INFO

accessLog: {}
